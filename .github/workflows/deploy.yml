name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main  # ganti ke 'master' jika branch utama Anda adalah master
  workflow_dispatch: # memungkinkan trigger manual dari GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (static export)
        run: npm run build

      - name: Push build output to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: deploy

      - name: Trigger cPanel Git pull
        if: ${{ env.CPANEL_HOST != '' }}
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: cpanel $CPANEL_USERNAME:$CPANEL_API_TOKEN" \
            "https://$CPANEL_HOST:2083/execute/VersionControl/update?name=suddha-law"
