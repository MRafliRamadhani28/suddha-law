name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main  # ganti ke 'master' jika branch utama Anda adalah master
  workflow_dispatch: # memungkinkan trigger manual dari GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (static export)
        run: npm run build

      - name: Push build output to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: deploy
          force_orphan: true

      - name: Trigger cPanel Git pull
        if: ${{ secrets.CPANEL_WEBHOOK_URL != '' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.CPANEL_WEBHOOK_URL }}")
          echo "cPanel webhook response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: cPanel webhook returned status $STATUS"
          fi
